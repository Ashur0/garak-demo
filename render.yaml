# Render Blueprint — one-click deploy config.
# On render.com: New + → Blueprint → connect this repo → Apply.
services:
  - type: web
    name: garak-demo
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: SECRET_KEY
        generateValue: true   # Render generates a strong random session key
